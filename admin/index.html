<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin | Tus Encantos</title>
    <link rel="icon" type="image/jpeg" href="../images/logo.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <img src="../images/logo.jpeg" alt="Tus Encantos" class="login-logo">
            <h1>Panel Administrativo</h1>
            <p>Ingresá tus credenciales para continuar</p>
            <form id="login-form" autocomplete="off">
                <div class="login-field">
                    <label for="login-user">Usuario</label>
                    <input type="text" id="login-user" placeholder="Usuario" required autocomplete="username">
                </div>
                <div class="login-field">
                    <label for="login-pass">Contraseña</label>
                    <input type="password" id="login-pass" placeholder="Contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn">Ingresar</button>
                <p id="login-error" class="login-error"></p>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard hidden">
        <aside class="admin-sidebar">
            <div class="sidebar-brand">
                <img src="../images/logo.jpeg" alt="Tus Encantos">
                <span>Tus Encantos</span>
            </div>
            <nav class="sidebar-nav">
                <button class="sidebar-link active" data-tab="products">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    Productos
                </button>
                <button class="sidebar-link" data-tab="orders">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Pedidos
                </button>
            </nav>
            <button class="sidebar-logout" id="btn-logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Cerrar sesión
            </button>
        </aside>

        <main class="admin-main">
            <!-- PRODUCTOS -->
            <section id="tab-products" class="admin-tab active">
                <div class="tab-header">
                    <h2>Productos</h2>
                    <button class="btn-add" id="btn-add-product">+ Nuevo Producto</button>
                </div>
                <div class="products-table-wrap">
                    <table class="admin-table" id="products-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Talles</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody"></tbody>
                    </table>
                    <p id="products-empty" class="empty-msg hidden">No hay productos cargados.</p>
                </div>
            </section>

            <!-- PEDIDOS -->
            <section id="tab-orders" class="admin-tab">
                <div class="tab-header">
                    <h2>Pedidos</h2>
                </div>
                <div class="products-table-wrap">
                    <table class="admin-table" id="orders-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Email</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th>Fecha</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody"></tbody>
                    </table>
                    <p id="orders-empty" class="empty-msg hidden">No hay pedidos.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL PRODUCTO -->
    <div id="product-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Nuevo Producto</h3>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <form id="product-form" class="modal-body">
                <input type="hidden" id="pf-id">
                <div class="modal-row">
                    <div class="modal-field">
                        <label>Nombre *</label>
                        <input type="text" id="pf-name" required>
                    </div>
                    <div class="modal-field">
                        <label>Precio *</label>
                        <input type="number" id="pf-price" min="0" required>
                    </div>
                </div>
                <div class="modal-row">
                    <div class="modal-field">
                        <label>Categoría *</label>
                        <select id="pf-category" required></select>
                    </div>
                    <div class="modal-field">
                        <label>Badge</label>
                        <input type="text" id="pf-badge" placeholder="Ej: Nuevo, Popular">
                    </div>
                    <div class="modal-field">
                        <label>Stock</label>
                        <div class="stock-per-size" id="pf-stock-grid">
                            <div class="stock-size-item"><span>XS</span><input type="number" id="pf-stock-XS" min="0" value="0"></div>
                            <div class="stock-size-item"><span>S</span><input type="number" id="pf-stock-S" min="0" value="0"></div>
                            <div class="stock-size-item"><span>M</span><input type="number" id="pf-stock-M" min="0" value="0"></div>
                            <div class="stock-size-item"><span>L</span><input type="number" id="pf-stock-L" min="0" value="0"></div>
                            <div class="stock-size-item"><span>XL</span><input type="number" id="pf-stock-XL" min="0" value="0"></div>
                            <div class="stock-size-item"><span>XXL</span><input type="number" id="pf-stock-XXL" min="0" value="0"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-field">
                    <label>Descripción *</label>
                    <textarea id="pf-description" rows="3" required></textarea>
                </div>
                <div class="modal-field">
                    <label>Imágenes</label>
                    <input type="file" id="pf-image-files" accept="image/jpeg,image/png,image/webp,image/gif" multiple>
                    <div id="pf-images-preview" class="images-preview"></div>
                </div>
                <div class="modal-field">
                    <label>Talles disponibles</label>
                    <div class="sizes-checkboxes" id="pf-sizes"></div>
                </div>
                <div class="modal-field">
                    <label>Características (una por línea)</label>
                    <textarea id="pf-features" rows="3" placeholder="Calce ajustado&#10;Tela dry-fit&#10;Envío gratis"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-cancel-product">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL PEDIDO -->
    <div id="order-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Detalle del Pedido</h3>
                <button class="modal-close" id="order-modal-close">✕</button>
            </div>
            <div class="modal-body" id="order-detail"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="admin-toast" class="admin-toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
