<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Migrar stock a por-talle - Tus Encantos</title>
    <style>
        body{font-family:sans-serif;max-width:600px;margin:60px auto;padding:20px}
        h1{font-size:1.4rem;color:#333}
        p{color:#555;font-size:.92rem}
        button{padding:14px 28px;background:#D96A9E;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:20px}
        button:hover{background:#c25888}
        #log{margin-top:20px;padding:16px;background:#f8f8f8;border-radius:8px;font-size:.85rem;white-space:pre-wrap;max-height:400px;overflow-y:auto}
    </style>
</head>
<body>
    <h1>Migrar stock general → stock por talle</h1>
    <p>Este script convierte el campo <code>stock: número</code> a <code>stock: { XS, S, M, L, XL, XXL }</code>.<br>
    Cada talle tomará el mismo valor que tenía el stock global. Si el producto ya tiene stock por talle, no se modifica.</p>
    <button onclick="migrate()">Ejecutar migración</button>
    <div id="log"></div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const ALL_SIZES = ['XS', 'S', 'M', 'L', 'XL', 'XXL'];
        const logEl = document.getElementById('log');
        function log(msg) { logEl.textContent += msg + '\n'; }

        async function migrate() {
            log('Buscando productos...');
            try {
                const snapshot = await db.collection('products').get();
                let migrated = 0, skipped = 0;
                for (const doc of snapshot.docs) {
                    const data = doc.data();
                    if (typeof data.stock === 'object' && data.stock !== null) {
                        log('— ' + (data.name || doc.id) + ' → ya tiene stock por talle, omitido.');
                        skipped++;
                        continue;
                    }
                    const globalStock = typeof data.stock === 'number' ? data.stock : 0;
                    const newStock = {};
                    ALL_SIZES.forEach(s => { newStock[s] = globalStock; });
                    await db.collection('products').doc(doc.id).update({ stock: newStock });
                    log('✓ ' + (data.name || doc.id) + ' → stock ' + globalStock + ' copiado a cada talle.');
                    migrated++;
                }
                log('\n¡Listo! Migrados: ' + migrated + ' | Omitidos: ' + skipped);
            } catch (err) {
                log('✗ Error: ' + err.message);
            }
        }
    </script>
</body>
</html>
